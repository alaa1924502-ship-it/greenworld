<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Greenhouse Dashboard</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    

<style>
body{
    margin:0;
    font-family:Poppins;
    background:#0f172a;
    color:white;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    height:100vh;
    background:linear-gradient(180deg,#022c22,#020617);
    padding:20px;
}
.sidebar h2{
    margin-bottom:30px;
}
.sidebar ul{
    list-style:none;
    padding:0;
}
.sidebar li{
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    cursor:pointer;
}
.sidebar li.active,
.sidebar li:hover{
    background:#22c55e;
}

/* MAIN */
.main{
    flex:1;
    padding:30px;
}

/* TOPBAR */
.topbar{
    display:flex;
    justify-content:space-between;
    margin-bottom:30px;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.stat{
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    transition:0.3s;
    text-align:center;
}

.stat:hover{
    transform:translateY(-5px);
}

.stat h3{
    color:#94a3b8;
}

.stat p{
    font-size:24px;
    margin-top:10px;
    color:#22c55e;
}

/* GLOW */
.glow{
    box-shadow:0 0 20px #22c55e55;
}

/* ALERT */
.alert{
    background:rgba(255,0,0,0.1);
}

/* CHART */
canvas{
    margin-top:40px;
    background:rgba(255,255,255,0.05);
    border-radius:20px;
    padding:20px;
}
</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">
    <h2>🌱 AI Panel</h2>
    <ul>
        <li class="active">Dashboard</li>
        <li>Analytics</li>
        <li>Plants</li>
        <li>Settings</li>
    </ul>
</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">
    <h2>Smart Greenhouse Dashboard</h2>
    <p>System Running 🟢</p>
</div>

<div class="cards">

```
<div class="stat glow">
    <h3>🌡 Temperature</h3>
    <p id="temp">24°C</p>
</div>

<div class="stat glow">
    <h3>💧 Soil Moisture</h3>
    <p id="soil">55%</p>
</div>

<div class="stat glow">
    <h3>🌫 Humidity</h3>
    <p id="hum">70%</p>
</div>

<div class="stat alert">
    <h3>⚡ Status</h3>
    <p id="status">Optimal</p>
</div>
```

</div>

<canvas id="chart"></canvas>

</div>

<script>

// Initial values
let temp = 24;
let soil = 55;
let hum = 70;

// Update fake live data
function updateData(){
    temp += (Math.random() - 0.5);
    soil += (Math.random() - 0.5)*2;
    hum += (Math.random() - 0.5)*2;

    document.getElementById("temp").innerText = temp.toFixed(1)+"°C";
    document.getElementById("soil").innerText = soil.toFixed(0)+"%";
    document.getElementById("hum").innerText = hum.toFixed(0)+"%";

    let status = "Optimal";
    let color = "#22c55e";

    if(temp > 28 || soil < 40){
        status = "Warning ⚠️";
        color = "orange";
    }

    if(temp > 32 || soil < 30){
        status = "Critical 🔴";
        color = "red";
    }

    let el = document.getElementById("status");
    el.innerText = status;
    el.style.color = color;

    // Update chart
    chart.data.labels.push("");
    chart.data.datasets[0].data.push(temp);

    if(chart.data.labels.length > 10){
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
    }

    chart.update();
}

setInterval(updateData,2000);

// Chart
const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: ["","","","","",""],
        datasets: [{
            label: 'Temperature',
            data: [24,25,23,26,24,25],
            borderColor: '#22c55e',
            tension: 0.4
        }]
    },
    options:{
        plugins:{
            legend:{labels:{color:"white"}}
        },
        scales:{
            x:{ticks:{color:"white"}},
            y:{ticks:{color:"white"}}
        }
    }
});

</script>
<script src="script.js"></script>
</body>
</html>
